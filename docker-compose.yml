version: "3.8"

services:

  # TimescaleDB — stores all stock price data
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: finagent_timescaledb
    environment:
      POSTGRES_USER: finagent
      POSTGRES_PASSWORD: finagent123
      POSTGRES_DB: finagent_db
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

  # Redis — caches prices and agent memory
  redis:
    image: redis:7-alpine
    container_name: finagent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ChromaDB — vector store for news and filing embeddings
  chromadb:
    image: chromadb/chroma:latest
    container_name: finagent_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  timescale_data:
  redis_data:
  chroma_data: